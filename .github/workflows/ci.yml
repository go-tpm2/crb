# go-tpm2/crb CI — vet, gofmt, and a 100%-coverage gate that RUNS the test
# suite on every 64-bit arch the go-tpm2 stack supports. This is a pure-Go
# (CGO=0) module that is NOT part of any workspace, so every Go invocation
# runs with GOWORK=off.
#
# Native amd64 (ubuntu-latest) and arm64 (ubuntu-24.04-arm) run the suite
# directly. The four remaining arches are cross-compiled into self-contained
# `go test -c` binaries and executed under QEMU via tonistiigi/binfmt. s390x
# is BIG-ENDIAN and exercises the go-tpm2 big-endian TPM 2.0 codec end to end
# (BuildCommand / header parsing), so a byte-order regression in the wire
# encoding surfaces here, not just in a build.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GOWORK: off
  CGO_ENABLED: 0

jobs:
  # Native arches: vet + gofmt + run the suite + 100% coverage gate.
  test:
    name: test (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, arch: amd64 }
          - { os: ubuntu-24.04-arm, arch: arm64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - run: go version

      - name: go vet
        run: go vet ./...

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt needs to be run on:"
            echo "$unformatted"
            exit 1
          fi

      - name: test + coverage gate (100%)
        run: |
          go test -coverprofile=cover.out ./...
          go tool cover -func=cover.out | tee cover.txt
          pct=$(go tool cover -func=cover.out | tail -n 1 | awk '{print $3}' | tr -d '%')
          echo "total coverage: ${pct}%"
          # Org-wide hard rule: 100% statement coverage. Never lowered — fill
          # the gap with a test, or delete the unreachable code.
          awk -v p="$pct" 'BEGIN { exit !(p+0 >= 100.0) }' || {
            echo "::error::coverage ${pct}% < 100.0%"; exit 1; }

  # Emulated arches under QEMU. The CRB driver is pure Go with no arch-specific
  # assembly, so these jobs exercise the same statements as the native runs —
  # the point is to prove the BIG-ENDIAN s390x target (and the other ports)
  # actually RUN the suite and pass the 100% gate, not merely compile. qemu cpu
  # models are the green set from the go-simd / go-compressions matrix (power9
  # for ppc64le, la464 for loong64, the default "qemu" for s390x — NOT z14,
  # which is fatal under TCG; rv64 with the V extension for riscv64). loong64
  # uses the loong64/debian image because Debian trixie has no official loong64
  # port image.
  emulated:
    name: emulated (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: riscv64, image: "debian:trixie", qemu: "rv64,v=true,vlen=128" }
          - { arch: loong64, image: "ghcr.io/loong64/debian:trixie", qemu: "la464" }
          - { arch: ppc64le, image: "debian:trixie", qemu: "power9" }
          - { arch: s390x,   image: "debian:trixie", qemu: "qemu" }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - run: docker run --privileged --rm tonistiigi/binfmt --install ${{ matrix.arch }}

      - name: build cover test binary
        run: GOOS=linux GOARCH=${{ matrix.arch }} go test -cover -coverpkg=./... -c -o /tmp/cov.test .

      - name: run under qemu and gate (100%)
        run: |
          docker run --rm --platform linux/${{ matrix.arch }} \
            -e QEMU_CPU=${{ matrix.qemu }} \
            -v /tmp:/t ${{ matrix.image }} \
            /t/cov.test -test.v -test.coverprofile=/t/cov.out
          go tool cover -func=/tmp/cov.out | tee /tmp/cover.txt
          pct=$(go tool cover -func=/tmp/cov.out | tail -n 1 | awk '{print $3}' | tr -d '%')
          echo "total coverage: ${pct}%"
          awk -v p="$pct" 'BEGIN { exit !(p+0 >= 100.0) }' || {
            echo "::error::coverage ${pct}% < 100.0%"; exit 1; }
